<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Planejamento - Usinagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="my-4">Editar Planejamento - Usinagem</h1>

        <form method="post" action="{% url 'apontamento_usinagem:editar_planejamento' planejamento.id %}">
            {% csrf_token %}

            <!-- Seção para adicionar peças dinamicamente -->
            <h4>Peças Planejadas</h4>
            <div id="pecasContainer">
                {% for peca_planejada in planejamento.pecas_planejadas.all %}
                <div class="row g-3 mb-2" id="pecaRow_{{ forloop.counter0 }}">
                    <div class="col-md-4">
                        <label for="peca_{{ forloop.counter0 }}" class="form-label">Peça</label>
                        <select name="peca_{{ forloop.counter0 }}" class="form-select" required>
                            {% for peca in pecas %}
                            <option value="{{ peca.id }}" {% if peca_planejada.peca.id == peca.id %}selected{% endif %}>
                                {{ peca.codigo }} - {{ peca.descricao }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="quantidade_{{ forloop.counter0 }}" class="form-label">Quantidade</label>
                        <input type="number" name="quantidade_{{ forloop.counter0 }}" class="form-control" value="{{ peca_planejada.quantidade_planejada }}" min="1" required>
                    </div>
                    <div class="col-md-3">
                        <label for="data_planejada_{{ forloop.counter0 }}" class="form-label">Data Planejada</label>
                        <input type="date" name="data_planejada_{{ forloop.counter0 }}" class="form-control" value="{{ planejamento.data_planejada|date:'Y-m-d' }}" required>

                    </div>
                    <div class="col-md-3">
                        <label for="maquina_{{ forloop.counter0 }}" class="form-label">Máquina</label>
                        <select name="maquina_{{ forloop.counter0 }}" class="form-select" required>
                            {% for maquina in maquinas %}
                            <option value="{{ maquina.id }}" {% if planejamento.maquina.id == maquina.id %}selected{% endif %}>
                                {{ maquina.nome }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                {% endfor %}
            </div>

            <input type="hidden" name="pecaCount" id="pecaCount" value="1">

            <!-- Botões de ação -->
            <div class="mt-4">
                <button type="submit" class="btn btn-success">Salvar Planejamento</button>
                <a href="{% url 'apontamento_usinagem:lista_ordens' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>

    <!-- Script para adicionar/remover peças dinamicamente -->
    <script>
        let pecaCount = {{ planejamento.pecas_planejadas.count }};  // Inicializa o contador com o número de peças atuais

        // Função para adicionar nova peça
        document.getElementById('addPecaBtn').addEventListener('click', function() {
            const pecasContainer = document.getElementById('pecasContainer');

            const newFields = `
                <div class="row g-3 mb-2" id="pecaRow_${pecaCount}">
                    <div class="col-md-4">
                        <label for="peca_${pecaCount}" class="form-label">Peça</label>
                        <select name="peca_${pecaCount}" class="form-select" required>
                            {% for peca in pecas %}
                                <option value="{{ peca.id }}">{{ peca.codigo }} - {{ peca.descricao }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="quantidade_${pecaCount}" class="form-label">Quantidade</label>
                        <input type="number" name="quantidade_${pecaCount}" class="form-control" min="1" required>
                    </div>
                    <div class="col-md-3">
                        <label for="data_planejada_${pecaCount}" class="form-label">Data Planejada</label>
                        <input type="date" name="data_planejada_${pecaCount}" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label for="maquina_${pecaCount}" class="form-label">Máquina</label>
                        <select name="maquina_${pecaCount}" class="form-select" required>
                            {% for maquina in maquinas %}
                                <option value="{{ maquina.id }}">{{ maquina.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-12 text-end">
                        <button type="button" class="btn btn-danger mt-2" onclick="removePeca(${pecaCount})">Remover</button>
                    </div>
                </div>
            `;

            pecasContainer.insertAdjacentHTML('beforeend', newFields);
            pecaCount++;
        });

        // Função para remover peça
        function removePeca(index) {
            document.getElementById('pecaRow_' + index).remove();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
