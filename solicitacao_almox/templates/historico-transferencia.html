{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid px-4 mt-4">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h4 mb-3">Histórico de Transferências</h2>
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label" for="data_solicitacao_inicio">Data solicitação inicial</label>
                    <input type="date" class="form-control" id="data_solicitacao_inicio">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="data_solicitacao_fim">Data solicitação final</label>
                    <input type="date" class="form-control" id="data_solicitacao_fim">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="data_entrega_inicio">Data entrega inicial</label>
                    <input type="date" class="form-control" id="data_entrega_inicio">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="data_entrega_fim">Data entrega final</label>
                    <input type="date" class="form-control" id="data_entrega_fim">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="chave_innovaro">Chave Innovaro</label>
                    <input type="text" class="form-control" id="chave_innovaro" placeholder="Digite a chave Innovaro">
                </div>
                <div class="col-md-8 d-flex gap-2 justify-content-md-end">
                    <button type="button" class="btn btn-primary" id="aplicar_filtros">Aplicar filtros</button>
                    <button type="button" class="btn btn-outline-secondary" id="limpar_filtros">Limpar</button>
                    <a href="/almox/historico/transferencia/exportar-csv/" class="btn btn-outline-success" id="exportar_csv">Exportar CSV</a>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table id="execucaoTable" class="display table table-sm table-striped w-100 mb-0">
                    <thead>
                        <tr>
                            <th>RPA</th>
                            <th>Innovaro</th>
                            <th>Data de Solicitação</th>
                            <th>Item</th>
                            <th>Quantidade</th>
                            <th>Depósito de destino</th>
                            <th>Solicitante</th>
                            <th>Observações</th>
                            <th>Entregue por</th>
                            <th>Data de Entrega</th>
                            <th>Status almox</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/datatable-historico-transferencia.js' %}?v=20260327-2"></script>
{% endblock %}
