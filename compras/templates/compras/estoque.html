{% extends "base.html" %}
{% load static %}

{% block title %}<title>Estoque – Saldo de Recurso</title>{% endblock %}

{% block links %}
<style>
  .estoque-toolbar {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .estoque-toolbar .form-label { margin-bottom: .2rem; font-size: .8rem; }

  #tabelaWrapper { overflow-x: auto; }

  #tabelaEstoque {
    width: 100%;
    border-collapse: collapse;
    font-size: .82rem;
    white-space: nowrap;
  }
  #tabelaEstoque thead th {
    position: sticky;
    top: 0;
    background: #343a40;
    color: #fff;
    padding: .45rem .6rem;
    border: 1px solid #495057;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  #tabelaEstoque thead th:hover { background: #495057; }
  #tabelaEstoque thead th .sort-icon { margin-left: .25rem; opacity: .5; }
  #tabelaEstoque thead th.sort-asc .sort-icon,
  #tabelaEstoque thead th.sort-desc .sort-icon { opacity: 1; }

  #tabelaEstoque tbody tr:nth-child(even) { background: #f8f9fa; }
  #tabelaEstoque tbody tr:hover { background: #e9f0fb; }
  #tabelaEstoque td {
    padding: .35rem .6rem;
    border: 1px solid #dee2e6;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge-total {
    font-size: .75rem;
    background: #0d6efd;
    color: #fff;
    padding: .25rem .6rem;
    border-radius: 999px;
    vertical-align: middle;
  }
  .spinner-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,.55);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }
  .spinner-overlay.active { display: flex; }
</style>
{% endblock %}

{% block content %}
<div class="spinner-overlay" id="spinner">
  <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status">
    <span class="visually-hidden">Carregando...</span>
  </div>
</div>

<div class="container-fluid mt-3">
  <div class="d-flex align-items-center mb-3 gap-2 flex-wrap">
    <h4 class="mb-0 me-2">Estoque – Saldo de Recurso</h4>
    <span class="badge-total" id="badgeTotal">0 itens</span>
    <button class="btn btn-sm btn-outline-secondary ms-auto" id="btnRefresh" title="Recarregar da planilha">
      <i class="fas fa-sync-alt"></i> Atualizar
    </button>
  </div>

  <!-- Filtros -->
  <div class="card mb-3 shadow-sm">
    <div class="card-body py-2">
      <div class="estoque-toolbar">
        <div>
          <label class="form-label">Busca</label>
          <input type="text" id="campoBusca" class="form-control form-control-sm"
                 placeholder="Pesquisar em todos os campos..." style="min-width:240px;">
        </div>
        <div id="wrapperGrupo" style="display:none;">
          <label class="form-label">Grupo / Tipo</label>
          <select id="selectGrupo" class="form-select form-select-sm" style="min-width:180px;">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="align-self-end">
          <button class="btn btn-sm btn-primary" id="btnFiltrar">
            <i class="fas fa-filter"></i> Filtrar
          </button>
          <button class="btn btn-sm btn-outline-secondary ms-1" id="btnLimpar">
            <i class="fas fa-times"></i> Limpar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div id="tabelaWrapper" style="display:none;">
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div style="overflow-x:auto; max-height:calc(100vh - 260px); overflow-y:auto;">
          <table id="tabelaEstoque">
            <thead id="theadEstoque"></thead>
            <tbody id="tbodyEstoque"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="mensagemVazio" class="text-center text-muted py-5" style="display:none;">
    <i class="fas fa-box-open fa-3x mb-3"></i>
    <p>Nenhum item encontrado.</p>
  </div>

  <div id="mensagemErro" class="alert alert-danger mt-3" style="display:none;"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/estoque.js' %}"></script>
{% endblock %}
