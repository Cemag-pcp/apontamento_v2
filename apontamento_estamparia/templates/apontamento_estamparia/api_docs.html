<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>API Estamparia — Documentação</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
  const spec = {
    openapi: "3.0.0",
    info: {
      title: "API Estamparia",
      version: "1.0.0",
      description: "Endpoints para criação de ordens de produção no setor de Estamparia."
    },
    servers: [
      { url: "https://cmgprod.com.br", description: "Produção" },
      { url: "https://apontamento-v2-testes.onrender.com", description: "Testes" }
    ],
    paths: {
      "/estamparia/api/criar-ordem-estamparia/": {
        post: {
          summary: "Criar ordem(ns) de produção",
          description: [
            "Aceita dois formatos:\n\n",
            "**Ordem única** — `application/x-www-form-urlencoded` ou JSON com objeto `{}`\n\n",
            "**Múltiplas ordens** — JSON com array `[{}, {}]`. Cada ordem é processada de forma independente: ",
            "erros em uma não afetam as demais."
          ].join(""),
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: {
                  oneOf: [
                    { "$ref": "#/components/schemas/OrdemInput" },
                    {
                      type: "array",
                      items: { "$ref": "#/components/schemas/OrdemInput" },
                      minItems: 1
                    }
                  ]
                },
                examples: {
                  unica: {
                    summary: "Ordem única (JSON)",
                    value: {
                      maquinaPlanejada: 11,
                      pecaSelect: "010108",
                      qtdPlanejada: 50,
                      dataProgramacao: "2026-06-10",
                      ordemPrioridade: 1,
                      observacoes: "Urgente cliente X"
                    }
                  },
                  multiplas: {
                    summary: "Múltiplas ordens (JSON)",
                    value: [
                      { maquinaPlanejada: 11, pecaSelect: "010108", qtdPlanejada: 50, dataProgramacao: "2026-06-10", ordemPrioridade: 1, observacoes: "Lote A" },
                      { maquinaPlanejada: 18, pecaSelect: "026875", qtdPlanejada: 20, dataProgramacao: "2026-06-11", ordemPrioridade: 2 }
                    ]
                  }
                }
              },
              "application/x-www-form-urlencoded": {
                schema: { "$ref": "#/components/schemas/OrdemInput" },
                examples: {
                  unica: {
                    summary: "Ordem única (form)",
                    value: {
                      maquinaPlanejada: 11,
                      pecaSelect: "010108",
                      qtdPlanejada: 50,
                      dataProgramacao: "2026-06-10",
                      ordemPrioridade: 1,
                      observacoes: "Urgente cliente X"
                    }
                  }
                }
              }
            }
          },
          responses: {
            "200": {
              description: "Ordem(ns) processada(s)",
              content: {
                "application/json": {
                  schema: {
                    oneOf: [
                      { "$ref": "#/components/schemas/RespostaUnica" },
                      { "$ref": "#/components/schemas/RespostaBatch" }
                    ]
                  },
                  examples: {
                    unica: {
                      summary: "Ordem única criada",
                      value: { message: "Status atualizado com sucesso.", ordem_id: 42780, maquina_id: 11 }
                    },
                    batch_parcial: {
                      summary: "Batch com erro parcial",
                      value: {
                        message: "2 ordem(ns) criada(s), 1 com erro.",
                        resultados: [
                          { index: 1, status: "criada", ordem_id: 42782, maquina_id: 11 },
                          { index: 2, status: "erro", error: "Ordem 2: Peça 'INVALIDA' não encontrada." },
                          { index: 3, status: "criada", ordem_id: 42783, maquina_id: 18 }
                        ]
                      }
                    }
                  }
                }
              }
            },
            "400": {
              description: "Erro de validação",
              content: {
                "application/json": {
                  schema: { "$ref": "#/components/schemas/Erro" },
                  examples: {
                    peca: { summary: "Peça não encontrada", value: { error: "Peça 'XYZ' não encontrada." } },
                    maquina: { summary: "Máquina não encontrada", value: { error: "Máquina com id '99' não encontrada." } },
                    prioridade: { summary: "Prioridade inválida", value: { error: "A prioridade deve ser maior ou igual a 1." } }
                  }
                }
              }
            }
          }
        }
      }
    },
    components: {
      schemas: {
        OrdemInput: {
          type: "object",
          required: ["maquinaPlanejada", "pecaSelect", "qtdPlanejada", "dataProgramacao", "ordemPrioridade"],
          properties: {
            maquinaPlanejada: {
              type: "integer",
              description: "ID da máquina. Opções: 9 Viradeira 1 · 10 Viradeira 2 · 11 Viradeira 3 · 12 Viradeira 4 · 13 Viradeira 5 · 18 Prensa · 69 Rebordeadeira · 70 Calandra · 77 Viradeira Manual",
              enum: [9, 10, 11, 12, 13, 18, 69, 70, 77],
              example: 11
            },
            pecaSelect: {
              type: "string",
              description: "Código da peça cadastrada no sistema.",
              example: "010108"
            },
            qtdPlanejada: {
              type: "integer",
              description: "Quantidade planejada para produção.",
              example: 50
            },
            dataProgramacao: {
              type: "string",
              format: "date",
              description: "Data programada no formato YYYY-MM-DD.",
              example: "2026-06-10"
            },
            ordemPrioridade: {
              type: "integer",
              minimum: 1,
              description: "Prioridade da ordem (mínimo 1).",
              example: 1
            },
            observacoes: {
              type: "string",
              description: "Observação livre. Será sufixada com ' - Ordem criada por api' automaticamente.",
              example: "Urgente cliente X"
            }
          }
        },
        RespostaUnica: {
          type: "object",
          properties: {
            message: { type: "string", example: "Status atualizado com sucesso." },
            ordem_id: { type: "integer", example: 42780 },
            maquina_id: { type: "integer", example: 11 }
          }
        },
        RespostaBatch: {
          type: "object",
          properties: {
            message: { type: "string", example: "2 ordem(ns) criada(s), 1 com erro." },
            resultados: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  index: { type: "integer" },
                  status: { type: "string", enum: ["criada", "erro"] },
                  ordem_id: { type: "integer" },
                  maquina_id: { type: "integer" },
                  error: { type: "string" }
                }
              }
            }
          }
        },
        Erro: {
          type: "object",
          properties: {
            error: { type: "string" }
          }
        }
      }
    }
  };

  SwaggerUIBundle({
    spec: spec,
    dom_id: '#swagger-ui',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout: "BaseLayout",
    deepLinking: true,
    defaultModelsExpandDepth: -1,
  });
</script>
</body>
</html>
